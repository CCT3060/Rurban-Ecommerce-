# Nginx configuration for Rurban E-Commerce
# Place this file at: /etc/nginx/sites-available/rurban
# Then run: sudo ln -s /etc/nginx/sites-available/rurban /etc/nginx/sites-enabled/
# Then run: sudo nginx -t && sudo systemctl reload nginx

# ── Rate limiting zones (defined in http context — add to /etc/nginx/nginx.conf) ─
# If running standalone, add these inside the http {} block of nginx.conf:
#   limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
#   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
#   limit_req_zone $binary_remote_addr zone=global_limit:10m rate=60r/s;

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;  # ← change to your domain

    # Redirect all HTTP to HTTPS (after SSL setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;  # ← change to your domain

    # SSL certificates (set up with Certbot — see guide)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (CSP handled by Next.js — see next.config.ts)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Remove deprecated X-XSS-Protection (CSP is the modern replacement)

    # Gzip compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # ── Rate limiting: authentication endpoints ────────────────────────────
    # 5 requests per minute per IP for login/register (brute-force protection)
    location /api/mobile/login {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/mobile/register {
        limit_req zone=auth_limit burst=2 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/b2b-register {
        limit_req zone=auth_limit burst=2 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Rate limiting: general API endpoints ──────────────────────────────
    # 30 requests per minute per IP for all other API routes
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Next.js static files — serve directly from Nginx (fast)
    location /_next/static/ {
        alias /var/www/rurban-ecommerce/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Public folder
    location /public/ {
        alias /var/www/rurban-ecommerce/public/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy all other requests to Next.js (PM2 on port 3000)
    location / {
        limit_req zone=global_limit burst=100 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Increase body size for file uploads (CSV import)
        client_max_body_size 10M;
    }
}
